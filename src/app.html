<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="description" content="Dog Activity Tracker PWA" />
  <meta name="theme-color" content="#eeffee" />

  <!-- PWA manifest -->
  <link rel="manifest" href="%sveltekit.assets%/manifest.json" />

  <!-- iOS support -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-title" content="Dog Tracker" />

  <!-- Icons -->
  <link rel="icon" href="%sveltekit.assets%/icon-192.png" />
  <!-- <link rel="apple-touch-icon" href="/icon-192.png" /> -->
  <link rel="stylesheet" href="/style.css" />

  <!-- Optional: prevent zoom bounce on iOS -->
  <meta name="format-detection" content="telephone=no" />

  <!-- CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

  <!-- dependencies -->
  <script src="/vendor/qrcode.min.js"></script>

  %sveltekit.head%

  <style>
    html,
    body {
      margin: 0px;
      padding: 0px;
    }
  </style>
</head>

<body data-sveltekit-preload-data="hover"> 
  <div style="display: contents;">%sveltekit.body%</div>
</body>

</html>
